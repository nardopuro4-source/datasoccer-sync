name: DataSoccer Sync

on:
  schedule:
    # Cada 15 minutos
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch: # permite ejecutar manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fixtures
        run: |
          echo "=== Sync $(date) ==="
          RESPONSE=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://datasoccer.byethost9.com/sync.php?key=a1b2c3..")
          echo "--- RESPONSE ---"
          echo "$RESPONSE"
          echo "--- END ---"
          echo "$RESPONSE" | python3 -m json.tool || echo "Not JSON"
